"*":
  push:
    - imports:
      - https://cnb.cool/frigate-cn/github-key/-/blob/87d2daf01d7346e48f6d45986c579f82e28a4d57/github-token.yml
      stages:
        - name: sync to github
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/Frigate-CN/docs.git
            auth_type: https
            username: ${github_username}
            password: ${github_access_token}

main:
  push:
    - stages:
      - name: build knowledge base
        image: cnbcool/knowledge-base
        settings:
          include: "docs/**/**.md"
          chunk_size: 3000

$:
  web_trigger_translate:
    - docker:
        image: cnbcool/default-npc:latest
      stages:
        - name: npc translate
          type: npc:go
          options:
            role: 翻译助手
            maxTurns: 100
            userPrompt: |
              请更新「$target_branch」分支的翻译。
              分支映射关系：
              - main 分支 → 对应官方 master 分支
              - beta 分支 → 对应官方 dev 分支
              请根据选择的目标分支，同步对应官方分支的文档变更，并将翻译结果提交到该分支。