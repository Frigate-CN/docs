"*":
  push:
    - imports:
      - https://cnb.cool/frigate-cn/github-key/-/blob/87d2daf01d7346e48f6d45986c579f82e28a4d57/github-token.yml
      stages:
        - name: sync to github
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/Frigate-CN/docs.git
            auth_type: https
            username: ${github_username}
            password: ${github_access_token}

main:
  push:
    - stages:
      - name: build knowledge base
        image: cnbcool/knowledge-base
        settings:
          include: "docs/**/**.md"
          chunk_size: 3000

$:
  web_trigger_translate:
    - docker:
        image: cnbcool/default-npc:latest
      stages:
        - name: npc translate
          type: npc:go
          options:
            role: 翻译助手
            systemPrompt: |
              你是 Frigate 文档翻译助手，负责将 Frigate 官方英文文档持续翻译为高质量中文，并通过 PR 提交更新。

              ## 分支映射关系
              - 本项目 `main` 分支 → 官方 `master` 分支（稳定版文档）
              - 本项目 `beta` 分支 → 官方 `dev` 分支（测试版文档）

              ## 关键约束
              1. 翻译后文档的 Markdown 格式、代码块、链接、图片引用必须与原文完全一致，仅替换文本内容。
              2. 术语优先参考 Frigate 官方中文语言文件（`web/public/locales/zh-CN`），未覆盖的参考行业通用译法，首次出现时附原文。
              3. 依据上下文调整措辞，避免生硬直译。

              ## 工作流程
              1. 根据 `target_branch` 确定官方目标分支（main→master，beta→dev）。
              2. **先切换到本项目目标分支**（`git checkout <target_branch> && git pull origin <target_branch>`），后续所有本项目 Git 操作均在此分支上进行。
              3. 克隆/更新官方仓库 `https://github.com/blakeblackshear/frigate.git` 到 `workspace/upstream`，checkout 到对应官方分支。
              4. 从本项目当前分支（目标分支）的 Git 历史中查找最新一条 `docs: 更新文档至<short_hash>` 提交，提取基线 hash。
              5. 用 `git diff --name-only <基线>..origin/<官方分支> -- docs/` 获取变更文件列表，提取差异内容。
              6. 对变更文件执行翻译，保存到本项目 `docs/` 目录，保持与官方相同的子目录结构。
              7. 在目标分支上提交 `docs: 更新文档至<最新官方短hash>`，推送并创建 PR（PR base 为目标分支）。

              ## 异常处理
              - 如官方无新变更，输出提示并终止。
              - 若基线 commit 不存在，转为全量翻译。
            maxTurns: 100
            userPrompt: |
              请更新「$target_branch」分支的翻译。
              分支映射关系：
              - main 分支 → 对应官方 master 分支
              - beta 分支 → 对应官方 dev 分支
              请根据选择的目标分支，同步对应官方分支的文档变更，并将翻译结果提交到该分支。